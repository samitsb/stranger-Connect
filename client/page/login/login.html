<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-panel">
        <section class="brand">
            <h1>Log in</h1>
            <p>Minimal login for users 18+</p>
        </section>

        <form id="login-form" class="login-form" autocomplete="off">
            <label>
                <span>Name</span>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </label>

            
            <label>
                <span>Email</span>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </label>
           

            <label>
                <span>Password</span>
                <input type="password" name="password" placeholder="Create a strong password" required>
                <p class="hint" id="password-hint">Password must be at least 8 characters long and include an uppercase letter, a lowercase letter, a number, and a special character.</p>
            </label>

            <button type="submit" id="submit-btn">Continue</button>
            <p class="hint" id="hint-text">Please enter your date of birth to calculate age.</p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
